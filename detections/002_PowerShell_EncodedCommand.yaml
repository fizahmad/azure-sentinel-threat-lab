id: "002"
name: "002 - PowerShell Encoded Command Execution"
description: >
  Detects PowerShell execution with Base64 encoded commands using -EncodedCommand/-enc.
  Uses Windows Security Event ID 4688 (process creation) from the SecurityEvent table.
severity: "High"

tactics:
  - "Execution"
  - "DefenseEvasion"
techniques:
  - "T1059.001"

queryFrequency: "PT5M"
queryPeriod: "PT1H"
triggerOperator: "GreaterThan"
triggerThreshold: 0

query: |
  // 002 - PowerShell Encoded Command Execution
  // Data: Windows Security Event 4688 via SecurityEvent table

  let timeframe = 1h;
  SecurityEvent
  | where TimeGenerated >= ago(timeframe)
  | where EventID == 4688
  | where NewProcessName has_any ("\\powershell.exe", "\\pwsh.exe")
  | where CommandLine has_any (" -enc ", " -encodedcommand ", "FromBase64String", " -e ")
  | project TimeGenerated, Computer, Account, NewProcessName, CommandLine, ParentProcessName
  | order by TimeGenerated desc

entityMappings:
  - entityType: "Host"
    fieldMappings:
      - identifier: "FullName"
        columnName: "Computer"
  - entityType: "Account"
    fieldMappings:
      - identifier: "Name"
        columnName: "Account"